version: '3.8'

services:
  # MongoDB for testing
  mongodb-test:
    image: mongo:7.0
    container_name: swiftpay-mongodb-test
    environment:
      MONGO_INITDB_ROOT_USERNAME: test_admin
      MONGO_INITDB_ROOT_PASSWORD: test_password
      MONGO_INITDB_DATABASE: swiftpay_test
    ports:
      - "27018:27017"
    volumes:
      - mongodb_test_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - swiftpay-test-network

  # Redis for testing
  redis-test:
    image: redis:7.2-alpine
    container_name: swiftpay-redis-test
    command: redis-server --requirepass test_redis_password
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - swiftpay-test-network

  # RabbitMQ for testing
  rabbitmq-test:
    image: rabbitmq:3.12-management-alpine
    container_name: swiftpay-rabbitmq-test
    environment:
      RABBITMQ_DEFAULT_USER: test_user
      RABBITMQ_DEFAULT_PASS: test_password
      RABBITMQ_DEFAULT_VHOST: test_vhost
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_test_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - swiftpay-test-network

  # Test runner service
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: swiftpay-test-runner
    environment:
      NODE_ENV: test
      MONGODB_URI: mongodb://test_admin:test_password@mongodb-test:27017/swiftpay_test?authSource=admin
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      REDIS_PASSWORD: test_redis_password
      RABBITMQ_URL: amqp://test_user:test_password@rabbitmq-test:5672/test_vhost
      JWT_SECRET: test_jwt_secret_key
      ENABLE_AI_FEATURES: false
      ENABLE_IP_VALIDATION: false
      ENABLE_CURRENCY_VALIDATION: false
      LOG_LEVEL: error
      SUPPRESS_TEST_LOGS: true
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./coverage:/app/coverage
    depends_on:
      mongodb-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      rabbitmq-test:
        condition: service_healthy
    command: npm test
    networks:
      - swiftpay-test-network

networks:
  swiftpay-test-network:
    driver: bridge

volumes:
  mongodb_test_data:
  redis_test_data:
  rabbitmq_test_data:
